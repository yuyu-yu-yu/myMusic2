<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06060e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preload" href="/assets/fusion-pixel-12px-monospaced-zh_hans.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="stylesheet" href="/styles.css" />
    <title>灿灿校园电台</title>
  </head>
  <body>
    <div id="crt-overlay"></div>
    <div id="app">
      <header class="topbar">
        <a class="brand" href="/" data-link aria-label="灿灿校园电台">
          <span class="brand-title">灿灿校园电台</span>
        </a>
        <nav class="nav">
          <a href="/" data-link>电台</a>
          <a href="/library" data-link>曲库</a>
          <a href="/diary" data-link>回顾</a>
          <a href="/mixer" data-link>调音台</a>
          <a href="/settings" data-link>设置</a>
        </nav>
      </header>
      <!-- Persistent audio layer — survives SPA navigation -->
      <div id="audio-layer" style="display:none">
        <audio id="host-audio"></audio>
        <audio id="song-audio" crossOrigin="anonymous"></audio>
      </div>
      <main id="view" class="view"></main>
    </div>
    <canvas id="visualizer-canvas" width="1200" height="800" aria-hidden="true"></canvas>
    <template id="player-template">
      <section class="player-shell">
        <div class="left-col">
          <div class="now-panel">
            <div id="ai-dj-avatar" class="ai-dj-avatar" data-state="idle" aria-label="AI DJ 灿灿">
              <video id="avatar-video" class="avatar-video" muted playsinline preload="auto"></video>
              <video id="avatar-video-buffer" class="avatar-video" muted playsinline preload="none" hidden></video>
              <img id="avatar-image" class="avatar-image" src="/avatar/source/cancan-first-frame.png" alt="AI DJ 灿灿" />
              <canvas id="avatar-transition-frame" class="avatar-transition-frame" aria-hidden="true" hidden></canvas>
              <span class="avatar-transition-mask" aria-hidden="true"></span>
              <span class="avatar-status">IDLE</span>
            </div>
            <div class="track-meta">
              <p class="eyebrow">AI PRIVATE RADIO</p>
              <h1 id="track-title">myMusic</h1>
              <p id="track-artist" class="muted">等待启动</p>
              <div class="playback-console">
                <div class="playback-controls" aria-label="播放控制">
                  <button id="previous-btn" class="transport-icon-btn transport-prev" type="button" title="没有上一首" aria-label="没有上一首" disabled>
                    <span class="transport-icon" aria-hidden="true"></span>
                  </button>
                  <button id="play-toggle-btn" class="transport-main-btn is-paused" type="button" title="继续" aria-label="继续">
                    <span class="transport-symbol" aria-hidden="true"></span>
                  </button>
                  <button id="next-btn" class="transport-icon-btn transport-next" type="button" title="下一首" aria-label="下一首">
                    <span class="transport-icon" aria-hidden="true"></span>
                  </button>
                </div>
                <div class="feedback-controls" aria-label="反馈控制">
                  <button id="like-btn" type="button" title="喜欢">喜欢</button>
                  <button id="dislike-btn" type="button" title="不喜欢">不喜欢</button>
                  <a id="ai-music-download" class="ai-music-download is-disabled" href="#" aria-disabled="true" tabindex="-1" title="AI 原创歌曲生成后可下载">
                    <span class="ai-music-download-icon" aria-hidden="true"></span>
                    <span id="ai-music-download-label">下载AI原创</span>
                  </a>
                </div>
              </div>
            </div>
          </div>
          <div id="progress-container" class="progress-container">
            <span id="progress-current" class="progress-time">00:00</span>
            <div id="progress-bar" class="progress-bar">
              <div id="progress-fill" class="progress-fill"></div>
              <button id="progress-thumb" class="progress-thumb" type="button" role="slider" aria-label="Seek playback position" aria-valuemin="0" aria-valuemax="0" aria-valuenow="0" aria-valuetext="00:00"></button>
            </div>
            <span id="progress-duration" class="progress-time">00:00</span>
          </div>
          <div class="radio-mode-launcher" role="group" aria-label="电台启动模式">
            <button id="start-btn" class="primary start-wide radio-mode-btn is-selected" type="button" data-radio-mode="single">单曲模式</button>
            <button id="concert-start-btn" class="primary start-wide radio-mode-btn" type="button" data-radio-mode="concert">音乐会模式</button>
          </div>
          <section id="concert-setup-panel" class="concert-setup-panel" hidden aria-label="音乐会设置">
            <div class="concert-setup-head">
              <div>
                <span>CONCERT PROGRAMMER</span>
                <strong>编排一场属于你的音乐会</strong>
              </div>
              <button id="concert-setup-close" class="concert-icon-btn" type="button" aria-label="关闭音乐会设置">×</button>
            </div>
            <div class="concert-setting-group">
              <span class="concert-setting-label">场次长度</span>
              <div class="concert-choice-row" data-concert-choice="length">
                <button type="button" class="is-selected" data-value="5">5 首</button>
                <button type="button" data-value="8">8 首</button>
                <button type="button" data-value="12">12 首</button>
              </div>
            </div>
            <div class="concert-setting-group">
              <span class="concert-setting-label">音乐类型 <small>最多选两个</small></span>
              <div class="concert-choice-row is-wrap" data-concert-choice="genres">
                <button type="button" class="is-selected" data-value="自动">自动</button>
                <button type="button" data-value="流行">流行</button>
                <button type="button" data-value="摇滚">摇滚</button>
                <button type="button" data-value="电子">电子</button>
                <button type="button" data-value="民谣">民谣</button>
                <button type="button" data-value="R&B">R&amp;B</button>
                <button type="button" data-value="爵士">爵士</button>
                <button type="button" data-value="纯音乐">纯音乐</button>
                <button type="button" data-value="国风">国风</button>
                <button type="button" data-value="ACG">ACG</button>
              </div>
            </div>
            <div class="concert-setting-grid">
              <div class="concert-setting-group">
                <span class="concert-setting-label">氛围</span>
                <select id="concert-mood">
                  <option>自动</option><option>温暖</option><option>热烈</option><option>平静</option>
                  <option>浪漫</option><option>怀旧</option><option>专注</option><option>深夜</option>
                </select>
              </div>
              <div class="concert-setting-group">
                <span class="concert-setting-label">场景</span>
                <select id="concert-scene">
                  <option>自动</option><option>夜晚独处</option><option>学习</option><option>通勤</option>
                  <option>运动</option><option>聚会</option><option>放松</option>
                </select>
              </div>
              <div class="concert-setting-group">
                <span class="concert-setting-label">观众团</span>
                <select id="concert-audience-preset">
                  <option>温暖</option><option>热闹</option><option>专业</option>
                </select>
              </div>
            </div>
            <label class="concert-note-field">
              <span>自由补充 <small id="concert-note-count">0 / 80</small></span>
              <input id="concert-note" type="text" maxlength="80" placeholder="例如：后半场想更轻快，不要太伤感" />
            </label>
            <div class="concert-setup-actions">
              <button id="concert-create-btn" class="primary" type="button">生成音乐会</button>
            </div>
          </section>
          <aside id="concert-console-panel" class="playlist-queue-panel concert-console-panel" hidden></aside>
          <div class="ai-music-mode">
            <button id="ai-music-toggle" class="ai-music-toggle" type="button" aria-pressed="false">
              <span class="ai-music-toggle-led" aria-hidden="true"></span>
              <span class="ai-music-toggle-copy">
                <strong>AI 原创电台模式</strong>
                <small>开启后下一首由灿灿根据状态生成<span class="ai-music-hint"> · 生成时间约一分钟，请耐心等待</span></small>
              </span>
            </button>
          </div>
          <div id="lyric" class="lyric"></div>
        </div>
        <div class="chat-panel">
          <div class="chat-header">
            <span class="eyebrow">灿灿 · AI DJ</span>
            <button id="mode-reset-btn" class="ghost" title="恢复正常推荐" style="display:none">恢复正常</button>
          </div>
          <div id="session-constraint-bar" class="session-constraint-bar" hidden aria-live="polite"></div>
          <div id="chat-messages" class="chat-messages">
            <div class="chat-msg dj-msg" data-initial-chat>
              <p>准备好以后，可以先点击选择模式，或者直接点击播放按钮。我会根据你的收藏、时间和心情来推荐音乐，你也可以随时跟我聊天。</p>
            </div>
          </div>
          <div id="scene-prompts" class="scene-prompts" aria-label="场景快捷提示词">
            <span class="scene-prompts-label">想在什么场景下使用？可以告诉灿灿</span>
            <button type="button" class="scene-prompt-chip" data-scene-prompt="自习室">自习室</button>
            <button type="button" class="scene-prompt-chip" data-scene-prompt="教室">教室</button>
            <button type="button" class="scene-prompt-chip" data-scene-prompt="健身房">健身房</button>
            <button type="button" class="scene-prompt-chip" data-scene-prompt="宿舍">宿舍</button>
          </div>
          <form id="chat-form" class="chat-form chat-form-inline">
            <input id="chat-input" autocomplete="off" placeholder="和灿灿聊聊..." />
            <button type="submit">发送</button>
          </form>
        </div>
      </section>
    </template>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const previewToken = params.get('eo_token');
        const previewTime = params.get('eo_time');
        const previewQuery = previewToken && previewTime
          ? `eo_token=${encodeURIComponent(previewToken)}&eo_time=${encodeURIComponent(previewTime)}`
          : '';
        const withPreviewQuery = (path) => previewQuery ? `${path}${path.includes('?') ? '&' : '?'}${previewQuery}` : path;

        if (previewQuery) {
          document.querySelectorAll('link[href^="/"]').forEach((link) => {
            if (!link.getAttribute('href').includes('eo_token=')) {
              link.setAttribute('href', withPreviewQuery(link.getAttribute('href')));
            }
          });
        }

        const loadApp = () => {
          const script = document.createElement('script');
          script.type = 'module';
          script.src = withPreviewQuery('/app.js');
          document.body.appendChild(script);
        };

        if (!previewQuery || !('serviceWorker' in navigator)) {
          loadApp();
          return;
        }

        const reloadKey = `mymusic:edgeonePreviewReload:${previewToken}:${previewTime}`;
        let loaded = false;
        const safeLoadApp = () => {
          if (loaded) return;
          loaded = true;
          loadApp();
        };

        const waitForController = () => new Promise((resolve) => {
          if (navigator.serviceWorker.controller) {
            resolve(true);
            return;
          }
          const timer = setTimeout(() => resolve(false), 1500);
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            clearTimeout(timer);
            resolve(true);
          }, { once: true });
        });

        navigator.serviceWorker.register(withPreviewQuery('/sw.js'), { scope: '/' })
          .then(() => navigator.serviceWorker.ready)
          .then(waitForController)
          .then((controlled) => {
            if (!controlled && sessionStorage.getItem(reloadKey) !== '1') {
              sessionStorage.setItem(reloadKey, '1');
              window.location.reload();
              return;
            }
            safeLoadApp();
          })
          .catch(safeLoadApp);
      })();
    </script>
  </body>
</html>
