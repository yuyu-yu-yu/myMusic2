<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06060e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <title>myMusic</title>
  </head>
  <body>
    <div id="crt-overlay"></div>
    <div id="app">
      <header class="topbar">
        <a class="brand" href="/" data-link>
          <span class="brand-mark">m</span>
          <span>myMusic</span>
        </a>
        <nav class="nav">
          <a href="/" data-link>电台</a>
          <a href="/library" data-link>曲库</a>
          <a href="/diary" data-link>日记</a>
          <a href="/settings" data-link>设置</a>
        </nav>
      </header>
      <!-- Persistent audio layer — survives SPA navigation -->
      <div id="audio-layer" style="display:none">
        <audio id="host-audio"></audio>
        <audio id="song-audio" crossOrigin="anonymous"></audio>
        <canvas id="visualizer-canvas" width="600" height="52"></canvas>
        <div id="equalizer-fallback" class="equalizer-fallback" style="display:none"></div>
      </div>
      <main id="view" class="view"></main>
    </div>
    <template id="player-template">
      <section class="player-shell">
        <div class="left-col">
          <div class="now-panel">
            <img id="cover" class="cover" src="/assets/cover-1.svg" alt="cover" />
            <div class="track-meta">
              <p class="eyebrow">AI PRIVATE RADIO</p>
              <h1 id="track-title">myMusic</h1>
              <p id="track-artist" class="muted">等待启动</p>
              <div class="transport transport-mini">
                <button id="pause-btn">暂停</button>
                <button id="resume-btn">继续</button>
                <button id="next-btn">下一首</button>
              </div>
            </div>
          </div>
          <div id="player-status" class="player-status">等待启动</div>
          <button id="start-btn" class="primary start-wide">启动电台</button>
          <div id="lyric" class="lyric"></div>
        </div>
        <div class="chat-panel">
          <div class="chat-header">
            <span class="eyebrow">灿灿 · AI DJ</span>
            <button id="mode-reset-btn" class="ghost" title="恢复正常推荐" style="display:none">恢复正常</button>
          </div>
          <div id="chat-messages" class="chat-messages">
            <div class="chat-msg dj-msg">
              <p>准备好以后点击启动电台，我会根据你的收藏、时间和心情来推荐音乐。你也可以随时跟我聊天。</p>
            </div>
          </div>
          <form id="chat-form" class="chat-form chat-form-inline">
            <input id="chat-input" autocomplete="off" placeholder="和灿灿聊聊..." />
            <button type="submit">发送</button>
          </form>
        </div>
      </section>
    </template>
    <script type="module" src="/app.js"></script>
  </body>
</html>
